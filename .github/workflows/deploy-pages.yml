name: Deploy Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pixu-dev-resume/pnpm-lock.yaml

      - name: Resolve project directory
        id: project
        run: |
          if [ -f pnpm-lock.yaml ] && [ -f package.json ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          elif [ -f pixu-dev-resume/pnpm-lock.yaml ] && [ -f pixu-dev-resume/package.json ]; then
            echo "dir=pixu-dev-resume" >> "$GITHUB_OUTPUT"
          else
            echo "Unable to locate project root containing package.json and pnpm-lock.yaml"
            exit 1
          fi

      - name: Install dependencies
        working-directory: ${{ steps.project.outputs.dir }}
        run: pnpm install --frozen-lockfile

      - name: Build site
        working-directory: ${{ steps.project.outputs.dir }}
        run: pnpm build

      - name: Install Playwright browsers
        working-directory: ${{ steps.project.outputs.dir }}
        run: pnpm exec playwright install --with-deps

      - name: Run end-to-end tests
        working-directory: ${{ steps.project.outputs.dir }}
        run: pnpm test

      - name: Disable Jekyll processing
        working-directory: ${{ steps.project.outputs.dir }}
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.project.outputs.dir }}/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
