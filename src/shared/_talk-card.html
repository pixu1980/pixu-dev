<article data-talk data-surface="lifted" data-hover-surface data-generated="sessionize-talk" data-reveal>
  <p data-kicker>Talk</p>
  <h3>{{ talk.title }}</h3>
  <p data-summary-text>{{ talk.teaserText }}</p>
  <section data-talk-actions>
    <include src="./_link.html" data='{"link": {{ talk.sessionizeLink | json | raw }}}'></include>
    <if condition="talk.githubLink">
      <include src="./_link.html" data='{"link": {{ talk.githubLink | json | raw }}}'></include>
    </if>
    <if condition="talk.slidesLink">
      <include src="./_link.html" data='{"link": {{ talk.slidesLink | json | raw }}}'></include>
    </if>
  </section>
</article>
