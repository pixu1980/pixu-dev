<div data-speaking>
  <aside
    data-speaking-recap
    data-surface="lifted"
    data-hover-surface
    data-generated="sessionize-speaker"
  >
    <p data-kicker>Sessionize profile</p>
    <h3>{{ section.speaker.headline || 'Public speaking' }}</h3>
    <p>{{ section.speaker.summary }}</p>
    <include
      src="../shared/_tag-list.html"
      data='{"items": {{ section.speaker.topics | json | raw }}, "ariaLabel": ""}'
    ></include>
    <section data-link-list>
      <include
        src="../shared/_link.html"
        data='{"link": {{ section.profileLink | json | raw }}}'
      ></include>
    </section>
  </aside>
  <section data-speaking-content>
    <section data-talk-grid>
      <for each="talk in section.talks">
        <include src="../shared/_talk-card.html" data='{"talk": {{ talk | json | raw }}}'></include>
      </for>
    </section>
    <if condition="section.events.length > 0">
      <section
        data-event-strip
        data-surface="lifted"
        data-hover-surface
        data-reveal
        aria-label="Sessionize events"
      >
        <p data-kicker>Events</p>
        <ol>
          <for each="event in section.events">
            <include
              src="../shared/_event-item.html"
              data='{"event": {{ event | json | raw }}}'
            ></include>
          </for>
        </ol>
      </section>
    </if>
  </section>
</div>
